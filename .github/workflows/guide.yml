name: Guide up to date

# Fails if GUIDE.md's autogenerated methods table is stale relative to the
# tool registrations in src/. Regenerate locally with:
#   node scripts/gen-guide.mjs

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-guide:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify GUIDE.md is regenerated
        run: node scripts/gen-guide.mjs --check
